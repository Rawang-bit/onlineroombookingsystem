<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SmartBook | Corporate Room Manager</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');

        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border-bottom: 1px solid #e2e8f0; }
        .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .active-view { background: #4f46e5 !important; color: white !important; box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2); }

        .is-today-header { background: #eef2ff !important; position: relative; }
        .is-today-header::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: #4f46e5; }
        .today-number {
            background: #4f46e5;
            color: white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 4px auto 0;
            box-shadow: 0 4px 10px rgba(79, 70, 229, 0.3);
        }

        .sticky-header { position: sticky; top: 0; z-index: 40; background: white; }
        .sticky-col { position: sticky; left: 0; z-index: 30; background: #f8fafc; border-right: 1px solid #e2e8f0; }
        thead th.sticky-col { z-index: 50; background: white; }

        .event-card {
            position: absolute;
            z-index: 10;
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 6px solid #4f46e5;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .event-card:hover {
            transform: translateY(-2px);
            z-index: 20;
            box-shadow: 0 12px 30px rgba(0,0,0,0.12);
        }

        @keyframes modalPop {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .animate-pop { animation: modalPop 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 antialiased min-h-screen">

    <header class="sticky top-0 z-50 glass px-6 py-4">
        <div class="grid grid-cols-3 items-center gap-4">
            <!-- Left -->
            <div class="flex items-center gap-2.5">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                    <i data-lucide="building-2" class="w-6 h-6"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter text-slate-800 hidden sm:block uppercase">
                    Smart<span class="text-indigo-600">Book</span>
                </span>
            </div>

            <!-- Center -->
            <div class="flex justify-center">
                <div class="w-full max-w-md">
                    <label class="sr-only" for="roomSwitcher">Select meeting room</label>
                    <select
                        id="roomSwitcher"
                        onchange="switchRoom(this.value)"
                        class="w-full bg-white border border-slate-200 shadow-sm rounded-2xl px-4 py-3 font-bold text-sm text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500"
                    ></select>
                </div>
            </div>

            <!-- Right -->
            <div class="text-right">
                <p class="text-lg font-black tabular-nums text-slate-800 leading-none" id="clock">00:00</p>
                <p class="text-[9px] font-bold text-indigo-500 uppercase tracking-widest mt-1" id="date-label">LOADING...</p>
            </div>
        </div>
    </header>

    <main class="p-6 md:p-10 max-w-7xl mx-auto">
        <div class="mb-10 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div>
                <h2 id="calendarHeaderDate" class="text-4xl font-black text-slate-900 tracking-tight leading-none">March 2026</h2>
                <div class="flex items-center gap-2 mt-2">
                    <i data-lucide="calendar" class="w-3.5 h-3.5 text-indigo-500"></i>
                    <p id="calendarSubtext" class="text-slate-500 font-bold text-xs uppercase tracking-widest">Executive Boardroom</p>
                </div>
                <p id="activeLocationDisplay" class="text-[10px] text-slate-400 font-bold uppercase tracking-wider mt-2">Level 4, North Wing</p>
            </div>

            <div class="flex items-center gap-4">
                <div class="inline-flex bg-white border border-slate-200 p-1 rounded-2xl shadow-sm">
                    <button onclick="navigate(-1)" class="p-2 hover:bg-slate-50 rounded-xl text-slate-600 transition-all">
                        <i data-lucide="chevron-left" class="w-5 h-5"></i>
                    </button>
                    <button onclick="navigate(0)" class="px-4 py-2 hover:bg-slate-50 rounded-xl text-xs font-bold text-slate-600 uppercase tracking-widest">
                        Today
                    </button>
                    <button onclick="navigate(1)" class="p-2 hover:bg-slate-50 rounded-xl text-slate-600 transition-all">
                        <i data-lucide="chevron-right" class="w-5 h-5"></i>
                    </button>
                </div>

                <div class="inline-flex bg-slate-200/50 p-1 rounded-2xl border border-slate-200">
                    <button id="view-daily" onclick="switchView('daily')" class="px-5 py-2 rounded-xl text-sm font-bold text-slate-500 transition-all">Daily</button>
                    <button id="view-weekly" onclick="switchView('weekly')" class="px-5 py-2 rounded-xl text-sm font-bold transition-all active-view">Weekly</button>
                </div>
            </div>
        </div>

        <div id="calendarContainer" class="bg-white rounded-[2.5rem] shadow-2xl border border-slate-200/60 overflow-auto relative h-[700px] custom-scroll"></div>
    </main>

    <div id="modalOverlay" class="fixed inset-0 z-[100] hidden bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-4">

        <!-- Verify -->
        <div id="verifyStep" class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md p-8 hidden animate-pop text-center">
            <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="shield-check"></i>
            </div>
            <h3 class="text-2xl font-black text-slate-800">Verify Identity</h3>

            <input type="email" id="verifyEmail" placeholder="email@company.com" class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-4 px-6 mb-4 focus:ring-2 focus:ring-indigo-500 outline-none font-bold text-center mt-4">

            <button id="verifySubmitBtn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl hover:bg-indigo-700 transition-all">
                Continue
            </button>

            <button onclick="closeModal()" class="w-full mt-2 text-slate-400 font-bold text-[10px] py-2 uppercase tracking-widest">
                Cancel
            </button>
        </div>

        <!-- Book -->
        <div id="bookStep" class="bg-white rounded-[3rem] shadow-2xl w-full max-w-lg overflow-hidden hidden animate-pop">
            <div class="bg-indigo-600 p-8 text-white">
                <h3 class="text-2xl font-black">Reserve Room</h3>
            </div>

            <div class="p-8 space-y-6">
                <div class="flex items-center gap-4 bg-slate-50 p-4 rounded-2xl border border-slate-100">
                    <div class="w-12 h-12 bg-indigo-600 rounded-full flex items-center justify-center text-white font-bold" id="userInitial">U</div>
                    <div>
                        <p id="userNameDisplay" class="font-bold text-slate-900"></p>
                        <p id="userEmailDisplay" class="text-[10px] text-indigo-500 font-black uppercase tracking-widest"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase">Starts</label>
                        <input type="text" id="startTimeStatic" readonly class="w-full bg-slate-100 rounded-2xl p-4 font-bold text-slate-500 text-center">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase">Ends</label>
                        <select id="endTimeSelect" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 font-bold outline-none"></select>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase ml-1">Meeting Title</label>
                        <input type="text" id="meetingPurpose" placeholder="Strategy Sync" class="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 font-bold focus:ring-2 focus:ring-indigo-500 outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] font-black text-slate-400 block mb-2 uppercase ml-1">Room</label>
                        <input type="text" id="selectedRoomDisplay" readonly class="w-full bg-slate-100 rounded-2xl p-4 font-bold text-slate-500 text-center">
                    </div>
                </div>

                <p id="bookingValidationMessage" class="hidden text-xs font-bold text-red-500 -mt-2"></p>

                <div class="grid grid-cols-2 gap-3">
                    <button onclick="submitBooking()" class="w-full bg-indigo-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all">
                        Create Booking
                    </button>
                    <button onclick="closeModal()" class="w-full bg-slate-100 text-slate-700 font-black py-5 rounded-2xl hover:bg-slate-200 transition-all">
                        Cancel
                    </button>
                </div>
            </div>
        </div>

        <!-- Details -->
        <div id="detailsStep" class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-md p-8 hidden animate-pop text-center">
            <div class="w-16 h-16 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="calendar-check"></i>
            </div>

            <h3 class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-2">Booking Details</h3>
            <p id="viewMeetingTime" class="text-slate-400 font-bold text-sm mb-4"></p>

            <div class="space-y-4 bg-slate-50 p-6 rounded-3xl mb-8 text-left border border-slate-100">
                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Meeting Title</label>
                    <p id="viewMeetingTitle" class="font-bold text-slate-800 text-lg"></p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Organizer</label>
                        <p id="viewMeetingUser" class="font-bold text-slate-700 text-sm"></p>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Location</label>
                        <p id="viewMeetingLocation" class="font-bold text-slate-700 text-sm"></p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Organizer Email</label>
                        <p id="viewMeetingEmail" class="font-bold text-slate-700 text-sm break-all"></p>
                    </div>
                    <div>
                        <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Duration</label>
                        <p id="viewMeetingDuration" class="font-bold text-slate-700 text-sm"></p>
                    </div>
                </div>

                <div>
                    <label class="text-[9px] font-black text-slate-400 uppercase block mb-1">Room</label>
                    <p id="viewMeetingRoom" class="font-bold text-slate-700 text-sm"></p>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <button onclick="requestCancelVerify()" class="w-full bg-red-50 text-red-600 font-black py-4 rounded-2xl hover:bg-red-100">
                    Cancel Meeting
                </button>
                <button onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">
                    Close
                </button>
            </div>
        </div>

        <!-- Cancel Confirm -->
        <div id="cancelConfirmStep" class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-8 hidden animate-pop text-center">
            <div class="w-16 h-16 bg-red-50 text-red-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i data-lucide="triangle-alert"></i>
            </div>

            <h3 class="text-2xl font-black text-slate-800 mb-2">Cancel Booking?</h3>
            <p id="cancelConfirmText" class="text-slate-500 font-medium mb-8"></p>

            <div class="flex flex-col gap-2">
                <button onclick="confirmCancelBooking()" class="w-full bg-red-600 text-white font-black py-4 rounded-2xl hover:bg-red-700 transition-all">
                    Yes, Cancel Meeting
                </button>
                <button onclick="showStep('details')" class="w-full bg-slate-100 text-slate-700 font-bold py-4 rounded-2xl">
                    Go Back
                </button>
            </div>
        </div>

        <!-- Inline Message Modal -->
        <div id="messageStep" class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-8 hidden animate-pop text-center">
            <div id="messageIconWrap" class="w-16 h-16 bg-amber-50 text-amber-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i id="messageIcon" data-lucide="info"></i>
            </div>

            <h3 id="messageTitle" class="text-2xl font-black text-slate-800 mb-2">Notice</h3>
            <p id="messageText" class="text-slate-500 font-medium mb-8"></p>

            <button id="messageBtn" onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">
                OK
            </button>
        </div>

        <!-- Success -->
        <div id="successStep" class="bg-white rounded-[2.5rem] shadow-2xl w-full max-w-sm p-10 hidden animate-pop text-center">
            <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="check-circle-2" class="w-10 h-10"></i>
            </div>
            <h3 id="successTitle" class="text-2xl font-black text-slate-800 mb-2">Success!</h3>
            <p id="successMessage" class="text-slate-500 font-medium mb-8"></p>
            <button onclick="closeModal()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl">
                Return to Calendar
            </button>
        </div>
    </div>

<script>
        let localUsers = [];
        let rooms = [];

        let state = {
            view: 'weekly',
            room: '',
            location: '',
            roomId: null,
            bookings: [],
            pending: null,
            activeUser: null,
            currentBookingId: null,
            cancelVerified: false,
            baseDate: new Date(),
            currentWeekDates: []
        };

        const hours = [
            "09:00 AM", "09:30 AM", "10:00 AM", "10:30 AM", "11:00 AM", "11:30 AM",
            "12:00 PM", "12:30 PM", "01:00 PM", "01:30 PM", "02:00 PM", "02:30 PM",
            "03:00 PM", "03:30 PM", "04:00 PM", "04:30 PM", "05:00 PM", "05:30 PM",
            "06:00 PM", "06:30 PM", "07:00 PM"
        ];

        async function api(path, options = {}) {
            const res = await fetch(path, {
                headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
                ...options
            });
            const data = await res.json().catch(() => ({}));
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        function isoToDisplayDate(value) {
            if (!value) return '';
            if (/^\d{4}-\d{2}-\d{2}$/.test(value)) return new Date(value + 'T00:00:00').toDateString();
            return new Date(value).toDateString();
        }

        function displayDateToISO(value) {
            const d = new Date(value);
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        async function loadInitialData() {
            try {
                const [roomData, bookingData] = await Promise.all([
                    api('/api/rooms'),
                    api('/api/bookings')
                ]);
                rooms = roomData.filter(r => r.status === 'Active');
                localUsers = [];
                state.bookings = bookingData
                    .filter(b => b.status !== 'Cancelled')
                    .map(b => ({
                        id: Number(b.id),
                        roomId: Number(b.roomId),
                        room: b.room || b.roomName,
                        location: b.location || '',
                        date: isoToDisplayDate(b.date),
                        dateISO: /^\d{4}-\d{2}-\d{2}$/.test(b.date) ? b.date : displayDateToISO(b.date),
                        startTime: b.startTime || b.start,
                        endTime: b.endTime || b.end,
                        user: b.user,
                        email: b.email,
                        purpose: b.purpose,
                        status: b.status
                    }));

                if (!rooms.length) {
                    showMessageModal('No Active Rooms', 'Please ask the admin to add or activate at least one meeting room.', 'circle-alert');
                    return;
                }

                state.room = rooms[0].name;
                state.location = rooms[0].location;
                state.roomId = rooms[0].id;
                populateRoomSwitcher();
                updateRoomHeader();
                calculateDates();
                renderCalendar();
            } catch (err) {
                showMessageModal('Connection Error', err.message || 'Unable to load room booking data from backend.', 'circle-alert');
            }
        }

        function updateHeaderClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString([], {
                hour: '2-digit',
                minute: '2-digit'
            });
            document.getElementById('date-label').innerText = now.toDateString().toUpperCase();
        }

        function populateRoomSwitcher() {
            const roomSwitcher = document.getElementById('roomSwitcher');
            roomSwitcher.innerHTML = rooms.map(room => `
                <option value="${room.id}" ${room.id === state.roomId ? 'selected' : ''}>
                    ${room.name} - ${room.location}
                </option>
            `).join('');
        }

        function getMonday(date) {
            const current = new Date(date);
            const dayOfWeek = current.getDay();
            const diff = current.getDate() - dayOfWeek + (dayOfWeek === 0 ? -6 : 1);
            return new Date(new Date(current).setDate(diff));
        }

        function calculateDates() {
            const current = new Date(state.baseDate);
            const monday = getMonday(current);
            state.currentWeekDates = [];

            for (let i = 0; i < 5; i++) {
                const d = new Date(monday);
                d.setDate(monday.getDate() + i);

                state.currentWeekDates.push({
                    short: d.toLocaleDateString('en-US', { weekday: 'short' }),
                    day: d.getDate(),
                    full: d.toDateString(),
                    iso: displayDateToISO(d.toDateString()),
                    isToday: d.toDateString() === new Date().toDateString()
                });
            }

            document.getElementById('calendarHeaderDate').innerText =
                current.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
        }

        function navigate(direction) {
            if (direction === 0) {
                state.baseDate = new Date();
            } else {
                state.baseDate = new Date(state.baseDate);
                state.baseDate.setDate(
                    state.baseDate.getDate() + (direction * (state.view === 'weekly' ? 7 : 1))
                );
            }
            calculateDates();
            renderCalendar();
        }

        function getTimeIndex(timeStr) { return hours.indexOf(timeStr); }

        function getMinutesFromTime(timeStr) {
            const [time, modifier] = timeStr.split(' ');
            let [hour, minute] = time.split(':').map(Number);
            if (hour === 12) hour = 0;
            if (modifier === 'PM') hour += 12;
            return (hour * 60) + minute;
        }

        function formatDuration(startTime, endTime) {
            const minutes = getMinutesFromTime(endTime) - getMinutesFromTime(startTime);
            const hrs = Math.floor(minutes / 60);
            const mins = minutes % 60;
            if (hrs > 0 && mins > 0) return `${hrs}h ${mins}m`;
            if (hrs > 0) return `${hrs}h`;
            return `${mins}m`;
        }

        function getRemainingMinutes(dateStr, endTimeStr) {
            const now = new Date();
            const todayStr = now.toDateString();
            if (dateStr !== todayStr) return null;
            const [time, modifier] = endTimeStr.split(' ');
            let [hoursEnd, minutesEnd] = time.split(':');
            if (hoursEnd === '12') hoursEnd = '00';
            if (modifier === 'PM') hoursEnd = parseInt(hoursEnd, 10) + 12;
            const end = new Date();
            end.setHours(hoursEnd, minutesEnd, 0, 0);
            const diff = Math.floor((end - now) / 60000);
            return (diff > 0 && diff < 480) ? diff : null;
        }

        function isPastSlot(dateStr, timeStr) {
            const now = new Date();
            const slotDate = new Date(dateStr);
            const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
            const slotDay = new Date(slotDate.getFullYear(), slotDate.getMonth(), slotDate.getDate());
            if (slotDay < today) return true;
            if (slotDay > today) return false;
            const slotMinutes = getMinutesFromTime(timeStr);
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            return slotMinutes <= currentMinutes;
        }

        function getRoomBookings() {
            return state.bookings.filter(b => Number(b.roomId) === Number(state.roomId));
        }

        function hasBookingConflict(roomId, date, startTime, endTime, excludeId = null) {
            const newStart = getMinutesFromTime(startTime);
            const newEnd = getMinutesFromTime(endTime);
            return state.bookings.some(booking => {
                if (Number(booking.roomId) !== Number(roomId)) return false;
                if (booking.date !== date) return false;
                if (excludeId && Number(booking.id) === Number(excludeId)) return false;
                const existingStart = getMinutesFromTime(booking.startTime);
                const existingEnd = getMinutesFromTime(booking.endTime);
                return newStart < existingEnd && newEnd > existingStart;
            });
        }

        function getAvailableEndTimes(roomId, date, startTime) {
            const endTimes = [];
            const startIdx = getTimeIndex(startTime);
            for (let i = startIdx + 1; i < hours.length; i++) {
                const candidateEndTime = hours[i];
                if (hasBookingConflict(roomId, date, startTime, candidateEndTime)) break;
                endTimes.push(candidateEndTime);
            }
            return endTimes;
        }

        function clearBookingValidation() {
            const el = document.getElementById('bookingValidationMessage');
            el.innerText = '';
            el.classList.add('hidden');
        }

        function showBookingValidation(message) {
            const el = document.getElementById('bookingValidationMessage');
            el.innerText = message;
            el.classList.remove('hidden');
        }

        function showMessageModal(title, text, icon = 'info') {
            document.getElementById('messageTitle').innerText = title;
            document.getElementById('messageText').innerText = text;
            const wrap = document.getElementById('messageIconWrap');
            const iconEl = document.getElementById('messageIcon');
            wrap.className = 'w-16 h-16 rounded-2xl flex items-center justify-center mx-auto mb-4';
            if (icon === 'circle-alert') wrap.classList.add('bg-amber-50', 'text-amber-600');
            else if (icon === 'shield-alert') wrap.classList.add('bg-red-50', 'text-red-600');
            else wrap.classList.add('bg-indigo-50', 'text-indigo-600');
            iconEl.setAttribute('data-lucide', icon);
            showStep('message');
        }

        function resetBookingFormFields() {
            document.getElementById('verifyEmail').value = '';
            document.getElementById('meetingPurpose').value = '';
            document.getElementById('endTimeSelect').innerHTML = '';
            clearBookingValidation();
        }

        function resetTransientState() {
            state.pending = null;
            state.activeUser = null;
            state.currentBookingId = null;
            state.cancelVerified = false;
        }

        function updateRoomHeader() {
            document.getElementById('calendarSubtext').innerText = state.room;
            document.getElementById('activeLocationDisplay').innerText = state.location;
            document.getElementById('roomSwitcher').value = state.roomId;
        }

        function switchRoom(roomId) {
            const selectedRoom = rooms.find(r => Number(r.id) === Number(roomId));
            if (!selectedRoom) return;
            state.roomId = selectedRoom.id;
            state.room = selectedRoom.name;
            state.location = selectedRoom.location;
            updateRoomHeader();
            renderCalendar();
        }

        function renderEmptyStateHint(container) {
            if (getRoomBookings().length > 0) return;
            container.insertAdjacentHTML('beforeend', `<div class="absolute bottom-6 right-6 bg-white/90 backdrop-blur border border-slate-200 rounded-2xl px-4 py-3 shadow-lg z-20">
                    <p class="text-[10px] font-black uppercase tracking-widest text-slate-400">Tip</p>
                    <p class="text-sm font-bold text-slate-600">Hover a free slot to create a booking in ${state.room}</p>
                </div>`);
        }

        function renderCalendar() {
            const container = document.getElementById('calendarContainer');
            const roomBookings = getRoomBookings();
            const displayDays = state.view === 'weekly'
                ? state.currentWeekDates
                : [{
                    short: state.baseDate.toLocaleDateString('en-US', { weekday: 'short' }),
                    day: state.baseDate.getDate(),
                    full: state.baseDate.toDateString(),
                    iso: displayDateToISO(state.baseDate.toDateString()),
                    isToday: state.baseDate.toDateString() === new Date().toDateString()
                }];

            let html = `<div class="relative"><table class="w-full border-collapse min-w-[1000px] relative">`;
            html += `<thead><tr><th class="w-24 p-6 sticky-col sticky-header"></th>`;
            displayDays.forEach(dateObj => {
                html += `<th class="p-6 border-r border-slate-100 text-center sticky-header ${dateObj.isToday ? 'is-today-header' : 'bg-white'}">
                        <span class="text-[10px] font-black ${dateObj.isToday ? 'text-indigo-600' : 'text-slate-400'} uppercase block mb-1 tracking-widest">${dateObj.short}</span>
                        <span class="${dateObj.isToday ? 'today-number font-black' : 'text-2xl font-black text-slate-700'}">${dateObj.day}</span>
                    </th>`;
            });
            html += `</tr></thead><tbody class="divide-y divide-slate-100 relative">`;
            html += `<tr class="h-4"><td class="sticky-col"></td>${displayDays.map(() => `<td class="border-r border-slate-100"></td>`).join('')}</tr>`;

            hours.forEach((time, index) => {
                html += `<tr class="h-28"><td class="sticky-col relative"><span class="absolute top-0 right-4 translate-y-[-50%] text-[10px] font-bold text-slate-400 uppercase bg-[#f8fafc] px-1 z-10 tabular-nums">${time}</span></td>`;
                displayDays.forEach(dateObj => {
                    const isBooked = roomBookings.some(b => b.date === dateObj.full && getTimeIndex(b.startTime) <= index && getTimeIndex(b.endTime) > index);
                    const isPast = isPastSlot(dateObj.full, time);
                    html += `<td class="p-2 border-r border-slate-100 relative group">
                        ${index < hours.length - 1 && !isBooked && !isPast
                            ? `<button onclick="openBookingFlow('${dateObj.full}', '${dateObj.iso}', '${time}')" class="opacity-0 group-hover:opacity-100 w-full h-full rounded-2xl border-2 border-dashed border-emerald-200 flex items-center justify-center text-emerald-600 transition-all"><i data-lucide="plus"></i></button>`
                            : isPast && dateObj.full === new Date().toDateString()
                                ? `<div class="w-full h-full rounded-2xl bg-slate-50/70"></div>`
                                : ''}
                    </td>`;
                });
                html += `</tr>`;
            });
            html += `</tbody></table>`;

            const tableWidth = container.clientWidth || 1000;
            const colWidth = (tableWidth - 96) / displayDays.length;
            roomBookings.forEach(booking => {
                const dayIndex = displayDays.findIndex(d => d.full === booking.date);
                if (dayIndex === -1) return;
                const startIdx = getTimeIndex(booking.startTime);
                const endIdx = getTimeIndex(booking.endTime);
                const remaining = getRemainingMinutes(booking.date, booking.endTime);
                html += `<div onclick="showDetails(${booking.id})"
                         class="event-card bg-indigo-50 border-indigo-600 animate-pop"
                         style="top: ${120 + (startIdx * 112)}px; left: ${96 + (dayIndex * colWidth) + 8}px; width: ${colWidth - 16}px; height: ${((endIdx - startIdx) * 112) - 16}px;">
                        <div class="flex justify-between items-start mb-1 gap-2">
                            <p class="text-[10px] font-black text-indigo-400 uppercase">${booking.startTime}</p>
                            ${remaining ? `<span class="bg-indigo-600 text-white text-[8px] font-black px-1.5 py-0.5 rounded-md uppercase tracking-tighter whitespace-nowrap">${remaining}m left</span>` : ''}
                        </div>
                        <p class="font-extrabold text-indigo-900 text-base leading-tight truncate">${booking.purpose}</p>
                        <p class="text-[11px] text-indigo-600 font-bold mt-2">${booking.user}</p>
                    </div>`;
            });
            container.innerHTML = html + `</div>`;
            renderEmptyStateHint(container);
            lucide.createIcons();
        }

        function switchView(v) {
            state.view = v;
            ['daily', 'weekly'].forEach(id => {
                const btn = document.getElementById('view-' + id);
                if (btn) btn.className = `px-5 py-2 rounded-xl text-sm font-bold transition-all ${v === id ? 'active-view' : 'text-slate-500'}`;
            });
            calculateDates();
            renderCalendar();
        }

        function openBookingFlow(date, dateISO, time) {
            if (isPastSlot(date, time)) {
                showMessageModal('Invalid Time Slot', 'Past time slots cannot be booked.', 'circle-alert');
                return;
            }
            state.pending = { date, dateISO, time, room: state.room, roomId: state.roomId };
            clearBookingValidation();
            showStep('verify');
            document.getElementById('verifySubmitBtn').onclick = handleBookingVerify;
        }

        async function handleBookingVerify() {
            const email = document.getElementById('verifyEmail').value.toLowerCase().trim();
            if (!/.+@.+\..+/.test(email)) {
                showMessageModal('Invalid Email', 'Please enter a valid email address.', 'circle-alert');
                return;
            }
            let user;
            try {
                user = await api('/api/public/users/validate?email=' + encodeURIComponent(email) + '&t=' + Date.now());
            } catch (err) {
                try {
                    const registeredUsers = await api('/api/public/users?t=' + Date.now());
                    user = registeredUsers.find(u => String(u.email || '').trim().toLowerCase() === email);
                } catch (_) {
                    user = null;
                }
                if (!user) {
                    showMessageModal('User Not Registered', `The email ${email} is not in the registered user list. Please check the exact email spelling in Admin > Users.`, 'circle-alert');
                    return;
                }
            }
            state.activeUser = user;
            document.getElementById('userNameDisplay').innerText = user.name;
            document.getElementById('userEmailDisplay').innerText = user.email;
            document.getElementById('userInitial').innerText = user.name.charAt(0);
            document.getElementById('startTimeStatic').value = state.pending.time;
            document.getElementById('selectedRoomDisplay').value = state.pending.room;
            const endSelect = document.getElementById('endTimeSelect');
            endSelect.innerHTML = '';
            const availableEndTimes = getAvailableEndTimes(state.pending.roomId, state.pending.date, state.pending.time);
            availableEndTimes.forEach(time => endSelect.add(new Option(time, time)));
            if (availableEndTimes.length === 0) {
                showMessageModal('No End Time Available', 'No valid end times are available for this selected slot.', 'circle-alert');
                return;
            }
            showStep('book');
        }

        async function submitBooking() {
            clearBookingValidation();
            const meetingPurpose = document.getElementById('meetingPurpose').value.trim();
            const endTime = document.getElementById('endTimeSelect').value;
            if (!state.pending || !state.activeUser) return showBookingValidation('Booking session expired. Please try again.');
            if (!meetingPurpose || meetingPurpose.length < 3) return showBookingValidation('Meeting title must be at least 3 characters.');
            if (!endTime) return showBookingValidation('Please select an end time.');
            if (isPastSlot(state.pending.date, state.pending.time)) return showBookingValidation('Past time slots cannot be booked.');
            if (hasBookingConflict(state.pending.roomId, state.pending.date, state.pending.time, endTime)) return showBookingValidation('This slot overlaps with an existing booking.');
            try {
                const saved = await api('/api/bookings', {
                    method: 'POST',
                    body: JSON.stringify({
                        roomId: Number(state.pending.roomId),
                        room: state.pending.room,
                        date: state.pending.dateISO,
                        start: state.pending.time,
                        end: endTime,
                        startTime: state.pending.time,
                        endTime: endTime,
                        purpose: meetingPurpose,
                        user: state.activeUser.name,
                        email: state.activeUser.email,
                        status: 'Booked'
                    })
                });
                state.bookings.push({
                    id: Number(saved.id),
                    roomId: Number(saved.roomId),
                    room: saved.room || saved.roomName,
                    location: saved.location || state.location,
                    date: isoToDisplayDate(saved.date),
                    dateISO: saved.date,
                    startTime: saved.startTime || saved.start,
                    endTime: saved.endTime || saved.end,
                    user: saved.user,
                    email: saved.email,
                    purpose: saved.purpose,
                    status: saved.status
                });
                document.getElementById('successTitle').innerText = 'Success!';
                document.getElementById('successMessage').innerText = 'Your booking has been created successfully.';
                resetBookingFormFields();
                resetTransientState();
                showStep('success');
                renderCalendar();
            } catch (err) {
                showBookingValidation(err.message || 'Unable to create booking.');
            }
        }

        function showDetails(id) {
            const b = state.bookings.find(x => Number(x.id) === Number(id));
            if (!b) return;
            state.currentBookingId = id;
            state.cancelVerified = false;
            document.getElementById('viewMeetingTitle').innerText = b.purpose;
            document.getElementById('viewMeetingTime').innerText = `${b.date} | ${b.startTime} - ${b.endTime}`;
            document.getElementById('viewMeetingUser').innerText = b.user;
            document.getElementById('viewMeetingLocation').innerText = b.location || '';
            document.getElementById('viewMeetingEmail').innerText = b.email;
            document.getElementById('viewMeetingDuration').innerText = formatDuration(b.startTime, b.endTime);
            document.getElementById('viewMeetingRoom').innerText = b.room;
            showStep('details');
        }

        function requestCancelVerify() {
            showStep('verify');
            document.getElementById('verifySubmitBtn').onclick = handleCancelVerify;
        }

        function handleCancelVerify() {
            const email = document.getElementById('verifyEmail').value.toLowerCase().trim();
            const booking = state.bookings.find(b => Number(b.id) === Number(state.currentBookingId));
            if (!booking || booking.email.toLowerCase() !== email) {
                showMessageModal('Access Denied', 'Only the original booking owner can cancel this meeting.', 'shield-alert');
                return;
            }
            state.cancelVerified = true;
            document.getElementById('cancelConfirmText').innerText = `Are you sure you want to cancel "${booking.purpose}" in ${booking.room}?`;
            showStep('cancelConfirm');
        }

        async function confirmCancelBooking() {
            if (!state.cancelVerified || !state.currentBookingId) return;
            const booking = state.bookings.find(b => Number(b.id) === Number(state.currentBookingId));
            try {
                await api(`/api/bookings/${state.currentBookingId}/cancel`, {
                    method: 'POST',
                    body: JSON.stringify({ email: booking.email })
                });
                state.bookings = state.bookings.filter(b => Number(b.id) !== Number(state.currentBookingId));
                document.getElementById('successTitle').innerText = 'Cancelled';
                document.getElementById('successMessage').innerText = 'The meeting booking has been cancelled successfully.';
                resetBookingFormFields();
                resetTransientState();
                showStep('success');
                renderCalendar();
            } catch (err) {
                showMessageModal('Cancel Failed', err.message || 'Unable to cancel this meeting.', 'shield-alert');
            }
        }

        function showStep(step) {
            document.getElementById('modalOverlay').classList.remove('hidden');
            ['verify', 'book', 'details', 'cancelConfirm', 'message', 'success'].forEach(s => {
                const el = document.getElementById(s + 'Step');
                if (el) el.classList.add('hidden');
            });
            const target = document.getElementById(step + 'Step');
            if (target) target.classList.remove('hidden');
            lucide.createIcons();
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.add('hidden');
            resetBookingFormFields();
            resetTransientState();
        }

        window.onload = () => {
            updateHeaderClock();
            calculateDates();
            loadInitialData();
            setInterval(() => { updateHeaderClock(); renderCalendar(); }, 60000);
            setInterval(() => {
                document.getElementById('clock').innerText = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            }, 1000);
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Book Room - Smart Meeting Room Booking</title><link rel="stylesheet" href="style.css"></head>
<body><div class="layout"><aside class="sidebar"><div class="brand">Smart Meeting Room Booking</div><nav class="nav"><a href="dashboard.html">Dashboard</a><a href="rooms.html">Rooms</a><a href="users.html">Users</a><a href="bookings.html">Bookings</a><a class="active" href="book-room.html">Book Room</a><a href="#" onclick="logout()">Logout</a></nav></aside>
<main class="main"><div class="topbar"><div><div class="page-title">Book a Meeting Room</div><div class="subtitle">Create a new room reservation in PostgreSQL</div></div></div><div class="grid grid-2"><section class="card"><div id="formMessage" class="notice" style="display:none;"></div><form id="bookingForm"><div class="row"><label>Full Name<input type="text" id="userName" required></label><label>Email<input type="email" id="userEmail" required></label></div><label>Meeting Room<select id="roomId" required></select></label><div class="row"><label>Date<input type="date" id="bookingDate" required></label><label>Purpose<input type="text" id="purpose" required></label></div><div class="row"><label>Start Time<input type="time" id="startTime" required></label><label>End Time<input type="time" id="endTime" required></label></div><button type="submit">Create Booking</button></form></section><section class="card"><div class="page-title" style="font-size:20px;margin-bottom:14px;">Available Rooms</div><div id="availableRooms" class="grid"></div></section></div></main></div>
<script src="app.js"></script><script>
requireAuth(); let rooms=[], bookings=[];
async function loadRooms(){ [rooms, bookings] = await Promise.all([getRooms(), getBookings()]); const active=rooms.filter(r=>r.status==='Active'); document.getElementById('roomId').innerHTML = '<option value="">Select a room</option>' + active.map(r=>`<option value="${r.id}">${escapeHtml(r.name)} (${escapeHtml(r.location)})</option>`).join(''); document.getElementById('availableRooms').innerHTML = active.map(r=>`<div class="card" style="padding:16px;box-shadow:none;"><strong>${escapeHtml(r.name)}</strong><div class="small">Capacity: ${r.capacity}</div><div class="small">Location: ${escapeHtml(r.location)}</div></div>`).join('') || '<div class="small">No active rooms found.</div>'; }
document.getElementById('bookingDate').value = todayISO();
document.getElementById('bookingForm').addEventListener('submit', async function(e){ e.preventDefault(); const roomId=Number(document.getElementById('roomId').value); const date=bookingDate.value; const start=startTime.value; const end=endTime.value; if(end <= start){ showMessage('formMessage','End time must be later than start time.','error'); return; } if(hasConflictInList(bookings, roomId, date, start, end)){ showMessage('formMessage','This room is already booked for the selected time slot.','error'); return; } try{ await createBooking({user:userName.value.trim(),email:userEmail.value.trim(),roomId,date,start,end,purpose:purpose.value.trim(),status:'Booked'}); this.reset(); bookingDate.value=todayISO(); showMessage('formMessage','Booking created successfully.','success'); bookings=await getBookings(); }catch(err){ showMessage('formMessage',err.message,'error'); } });
loadRooms().catch(err=>showMessage('formMessage',err.message,'error'));
</script></body></html>
